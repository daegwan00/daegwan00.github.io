name: Notion → Blog Auto Publish

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST
  workflow_dispatch:       # 수동 실행

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - run: npm ci
        working-directory: scripts

      - name: Fetch & convert Notion posts
        id: fetch
        env:
          NOTION: ${{ secrets.NOTION }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATABASE_ID_AWS: ${{ secrets.NOTION_DATABASE_ID_AWS }}
          NOTION_DATABASE_ID_SYSTEM: ${{ secrets.NOTION_DATABASE_ID_SYSTEM }}
        run: node scripts/fetch-notion.js

      - name: Setup Hugo
        if: steps.fetch.outputs.new_posts != '0'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        if: steps.fetch.outputs.new_posts != '0'
        run: hugo --minify

      - name: Deploy to GitHub Pages
        if: steps.fetch.outputs.new_posts != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Commit generated posts
        if: steps.fetch.outputs.new_posts != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "post: auto publish from Notion"
          git push
